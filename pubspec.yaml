# Flutter Launcher Icons configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: "assets/images/savage_timer_logo_android.png"
  image_path_ios: "assets/images/savage_timer_logo_ios.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/images/savage_timer_logo_android.png"
  remove_alpha_ios: true
